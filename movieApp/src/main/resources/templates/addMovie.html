<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Movie</title>
</head>
<body>

<h1>Add / Edit Movie</h1>

<a href="/movies">Back to List</a>

<br><br>

<div th:if="${errorMsg}" style="color:red;">
    <p th:text="${errorMsg}"></p>
</div>

<form th:action="@{/save}" th:object="${movie}" method="post">

    <input type="hidden" th:field="*{id}">

    Name:
    <input type="text" th:field="*{name}">
    <span style="color:red" th:errors="*{name}"></span>
    <br><br>

    Rating:
    <input type="number" step="0.1" th:field="*{rating}">
    <span style="color:red" th:errors="*{rating}"></span>
    <br><br>

    Genre:
    <select th:field="*{genre}">
        <option value="">--Select--</option>
        <option value="Drama">Drama</option>
        <option value="Fiction">Fiction</option>
        <option value="Satire">Satire</option>
    </select>
    <span style="color:red" th:errors="*{genre}"></span>

    <br><br>

    <button type="submit">Save</button>

</form>

</body>
</html>
