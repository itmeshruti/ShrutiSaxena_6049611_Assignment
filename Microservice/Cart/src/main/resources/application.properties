spring.application.name=Cart


server.port=8085
#eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.config.import=optional:configserver:http://localhost:8888




resilience4j.circuitbreaker.instances.cartServiceCB.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.cartServiceCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.cartServiceCB.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.cartServiceCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.cartServiceCB.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.cartServiceCB.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.cartServiceCB.eventConsumerBufferSize=10
resilience4j.circuitbreaker.instances.cartServiceCB.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.cartServiceCB.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.cartServiceCB.recordExceptions=java.lang.Exception


management.endpoints.web.exposure.include=*
